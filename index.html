<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titleProject Gallery></title>
</head>
<body>

    

    <div class="project-gallery">
        <div class="project">
            <h3>Project 1</h3>
            <button class="toggle-details">Show Details</button>
            <div class="project-details" style="display: none;">
                <p>Details about Project 1...</p>
            </div>
        </div>
    
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <small class="error" style="display: none;">Name is required.</small>
        
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <small class="error" style="display: none;">Please enter a valid email.</small>
        
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <small class="error" style="display: none;">Message cannot be empty.</small>
        
            <button type="submit">Submit</button>
        </form>
